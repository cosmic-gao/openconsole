name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  affected:
    name: Affected typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # `nx affected` needs the full history to compute the diff.
          fetch-depth: 0

      - name: Set base / head SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify formatting
        run: pnpm format:check

      - name: Affected typecheck
        run: pnpm nx affected -t typecheck --parallel=4

      - name: Affected tests
        run: pnpm nx affected -t test --parallel=4
