name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (preview only, no publish)"
        type: boolean
        default: false
      first-release:
        description: "First release of any new packages (no prior tags)"
        type: boolean
        default: false

# Only one release at a time.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release public packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push commits, tags, GitHub release
      id-token: write # npm provenance (Sigstore OIDC)
      attestations: write # GitHub-side SLSA build provenance
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT or default token — default token can push to protected branches
          # when "Allow specified actors to bypass required pull requests" is on.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Final pre-release check
        run: pnpm nx run-many -t typecheck test --parallel=3

      - name: Release (dry-run)
        if: ${{ inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          pnpm release \
            --dry-run \
            ${{ inputs.first-release && '--first-release' || '' }}

      - name: Release
        if: ${{ !inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          pnpm release \
            --yes \
            ${{ inputs.first-release && '--first-release' || '' }}

      # SLSA L2 build provenance attestation — complements npm provenance with
      # a GitHub-signed attestation discoverable via the GitHub UI.
      # https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations
      - name: Attest build provenance
        if: ${{ !inputs.dry-run }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            packages/atoms/package.json
            packages/shadcn/package.json
            packages/nacos/package.json
