name: Stale

on:
  schedule:
    - cron: "30 1 * * *" # daily 01:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 45
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-message: |
            此 issue 因 45 天无活动被标为 stale。
            如果仍然有效，请在评论中说明，否则将在 14 天后自动关闭。
          close-issue-message: |
            此 issue 因长期无活动已自动关闭。如需重新跟进请评论或重新打开。
          stale-pr-message: |
            此 PR 因 30 天无活动被标为 stale。请 rebase / 处理冲突或在评论中说明状态。
          close-pr-message: |
            此 PR 因长期无活动已自动关闭。如需继续推进请重新打开。
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security,blocked"
          ascending: true
          operations-per-run: 60
