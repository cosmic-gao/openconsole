name: Bug report / Bug 反馈
description: 报告一个 bug 或非预期行为
title: "fix(<scope>): <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢花时间反馈问题。请尽量完整地填写，便于复现。

  - type: input
    id: package
    attributes:
      label: 受影响的包 / Affected package
      description: 例如 `@openconsole/atoms`
      placeholder: "@openconsole/atoms"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本 / Version
      placeholder: "0.0.2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: 现象 / What happened
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期 / Expected
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Steps to reproduce
      description: 1. ... 2. ... 3. ...  最好提供一个最小可复现仓库 / StackBlitz。
      render: markdown
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: 环境 / Environment
      description: 操作系统、Node、pnpm、浏览器版本等
      placeholder: |
        - OS:
        - Node:
        - pnpm:
        - Browser:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志 / Logs
      description: 相关错误日志、堆栈
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 自查 / Checklist
      options:
        - label: 我已经搜索过现有 issue，未发现重复
          required: true
        - label: 我在最新版本上仍能复现
          required: false
