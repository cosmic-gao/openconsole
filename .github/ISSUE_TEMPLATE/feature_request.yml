name: Feature request / 需求
description: 提议一个新功能或改进
title: "feat(<scope>): <short description>"
labels: ["enhancement", "triage"]
body:
  - type: input
    id: package
    attributes:
      label: 涉及的包 / Package
      placeholder: "@openconsole/atoms"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题 / Problem statement
      description: 这个功能想解决什么实际问题？避免直接描述方案。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案 / Proposed solution
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充上下文 / Additional context
    validations:
      required: false
